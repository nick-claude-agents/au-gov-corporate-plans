name: Refresh & backfill BD briefs

# Runs in the cloud (GitHub Actions), not on any local machine.
# - Refreshes every brief older than 60 days (rolling 2-month cadence per brief).
# - Backfills missing curated briefs as fast as the API rate limit allows,
#   committing each brief the moment it is generated (so a job timeout never
#   loses work) and resuming via --skip-existing on the next run.
# Runs every 6 hours so it keeps churning through the backlog, then becomes a
# cheap no-op once every reachable agency has a brief.
# Requires the repo secret ANTHROPIC_API_KEY.

on:
  schedule:
    - cron: '0 */6 * * *'    # every 6 hours
  workflow_dispatch:
    inputs:
      backfill_limit:
        description: 'Max briefs to generate this run'
        required: false
        default: '50'

permissions:
  contents: write

concurrency:
  group: bd-briefs            # never let two brief jobs run/commit at once
  cancel-in-progress: false

jobs:
  briefs:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # generation is slow on a low rate-limit tier
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Refresh briefs older than 60 days
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python manage_briefs.py --refresh-stale --max-age-days 60

      - name: Backfill missing curated briefs (commit each)
        id: backfill
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          LIMIT="${{ github.event.inputs.backfill_limit || '50' }}"
          python manage_briefs.py --all --curated --skip-existing \
            --limit "$LIMIT" --commit-each

      - name: Commit any remaining briefs (safety net)
        run: |
          git add briefs
          if git diff --staged --quiet; then
            echo "Nothing left to commit."
            exit 0
          fi
          git commit -m "Briefs update $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin main; then
              echo "Pushed."
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 8 + 3))
          done
          echo "Push failed after retries."
          exit 1
